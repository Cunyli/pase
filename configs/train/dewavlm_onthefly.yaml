repo_name: pase
experiment: dewavlm
dataset_type: use_simulation_onthefly

teacher_config:
  wavlm_ckpt_path: ${oc.env:PASE_WAVLM_CKPT,checkpoints/pase_hf/WavLM-Large.pt}
  output_layer: 24
  load_pretrained: True
  frozen: True

student_config:
  wavlm_ckpt_path: ${oc.env:PASE_WAVLM_CKPT,checkpoints/pase_hf/WavLM-Large.pt}
  output_layer: 24
  load_pretrained: True
  frozen: False

vocoder_config:
  ckpt_path: ${oc.env:PASE_VOCODER_L24_CKPT,checkpoints/pase_hf/Vocoder_L24.tar}

DDP:
  world_size: 4  # not used

optimizer:
  lr: 0.001  # not used

scheduler:
  warmup_steps: 10000  # default: 10000=20 epochs
  decay_until_step: 100000  # default: 100000=200 epochs
  max_lr: 1e-4
  min_lr: 1e-6

samplerate:
  16000

train_dataset:
  use_simulation_root: ${oc.env:USE_SIMULATION_ROOT,../USE_simulation}
  clean_json: ${oc.env:PASE_TRAIN_CLEAN_JSON,/path/to/clean_train.json}
  noise_json: ${oc.env:PASE_NOISE_JSON,/path/to/noise.json}
  rir_json: ${oc.env:PASE_RIR_JSON,/path/to/rir.json}
  simulation_config: ${oc.env:PASE_SIMULATION_CONFIG,/path/to/simulation.yaml}
  wav_len: 4
  num_per_epoch: 8000
  random_start: True
  snr_range: [-5, 15]
  default_fs: 16000
  mode: train

train_dataloader:
  batch_size: 4  # default: 4 per GPU
  num_workers: 4
  drop_last: True
  pin_memory: True

validation_dataset:
  use_simulation_root: ${oc.env:USE_SIMULATION_ROOT,../USE_simulation}
  clean_json: ${oc.env:PASE_VALID_CLEAN_JSON,/path/to/clean_valid.json}
  noise_json: ${oc.env:PASE_NOISE_JSON,/path/to/noise.json}
  rir_json: ${oc.env:PASE_RIR_JSON,/path/to/rir.json}
  simulation_config: ${oc.env:PASE_SIMULATION_CONFIG,/path/to/simulation.yaml}
  wav_len: 4
  num_per_epoch: 1000
  random_start: False
  snr_range: [-5, 15]
  default_fs: 16000
  mode: validation

validation_dataloader:
  batch_size: 1    # default: 1
  num_workers: 4
  drop_last: True
  pin_memory: True

trainer:
  epochs: 200
  save_checkpoint_interval: 10
  clip_grad_norm_value: 3.0
  run_root: ${oc.env:PASE_RUN_ROOT,./runs}
  checkpoint_root: ${oc.env:PASE_GLOBAL_CHECKPOINT_DIR,./checkpoints}
  exp_path: ${trainer.run_root}/dewavlm
  resume: False
  resume_datetime: 2026-03-24-14h57m
  use_wandb: false
  wandb_project: pase
  wandb_entity: null
  wandb_mode: online
  wandb_run_name: null
  wandb_tags: ["pase", "dewavlm", "use_simulation", "onthefly"]
