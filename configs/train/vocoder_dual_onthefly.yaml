repo_name: pase
experiment: vocoder_dual
dataset_type: use_simulation_onthefly

encoder_config:
  wavlm_ckpt_path: ${oc.env:PASE_DEWAVLM_CKPT,checkpoints/pase_hf/DeWavLM.tar}
  output_layer: [1, 24]

vocoder_config:
  input_channels: 1024
  dim: 768
  intermediate_dim: 2304
  num_layers: 12
  n_fft: 1280
  hop_length: 320

discriminator_config:
  mpd:
    mpd_reshapes: [2, 3, 5, 7, 11]
  mbd:
    mbd_fft_sizes: [2048, 1024, 512]

DDP:
  world_size: 4

optimizer:
  lr: 1e-4

scheduler:
  warmup_steps: 10000  # default: 20k steps
  decay_until_step: 200000  # default: 200k steps
  max_lr: 2e-4
  min_lr: 1e-6

loss:
  sampling_rate: 16000
  n_mels: [5, 10, 20, 40, 80, 160, 320]
  window_lengths: [32, 64, 128, 256, 512, 1024, 2048]
  mag_weight: 0.0
  log_weight: 1.0
  pow: 1.0
  weight: 1.0
  window_type: "hann"

coeff:
  recons: 15
  adv: 2
  feat: 1

samplerate:
  16000

train_dataset:
  use_simulation_root: ${oc.env:USE_SIMULATION_ROOT,../USE_simulation}
  clean_json: ${oc.env:PASE_TRAIN_CLEAN_JSON,/path/to/clean_train.json}
  noise_json: ${oc.env:PASE_NOISE_JSON,/path/to/noise.json}
  rir_json: ${oc.env:PASE_RIR_JSON,/path/to/rir.json}
  simulation_config: ${oc.env:PASE_SIMULATION_CONFIG,/path/to/simulation.yaml}
  wav_len: 4
  num_per_epoch: 24000
  random_start: True
  snr_range: [-5, 15]
  default_fs: 16000
  mode: train

train_dataloader:
  batch_size: 12  # default: 12 per GPU
  num_workers: 4
  drop_last: True
  pin_memory: True

validation_dataset:
  use_simulation_root: ${oc.env:USE_SIMULATION_ROOT,../USE_simulation}
  clean_json: ${oc.env:PASE_VALID_CLEAN_JSON,/path/to/clean_valid.json}
  noise_json: ${oc.env:PASE_NOISE_JSON,/path/to/noise.json}
  rir_json: ${oc.env:PASE_RIR_JSON,/path/to/rir.json}
  simulation_config: ${oc.env:PASE_SIMULATION_CONFIG,/path/to/simulation.yaml}
  wav_len: 4
  num_per_epoch: 1000
  random_start: False
  snr_range: [-5, 15]
  default_fs: 16000
  mode: validation

validation_dataloader:
  batch_size: 1    # default: 1
  num_workers: 4
  drop_last: True
  pin_memory: True

trainer:
  epochs: 400
  save_checkpoint_interval: 10
  clip_grad_norm_value: 3.0
  run_root: ${oc.env:PASE_RUN_ROOT,./runs}
  checkpoint_root: ${oc.env:PASE_GLOBAL_CHECKPOINT_DIR,./checkpoints}
  exp_path: ${trainer.run_root}/vocoder_dual
  resume: False
  resume_datetime: 2025-07-27-12h11m
  use_wandb: false
  wandb_project: pase
  wandb_entity: null
  wandb_mode: online
  wandb_run_name: null
  wandb_tags: ["pase", "vocoder_dual", "use_simulation", "onthefly"]
