repo_name: pase
experiment: vocoder_l24
dataset_type: use_simulation_clean

encoder_config:
  wavlm_ckpt_path: ${oc.env:PASE_WAVLM_CKPT,checkpoints/pase_hf/WavLM-Large.pt}
  output_layer: 24

vocoder_config:
  input_channels: 1024
  dim: 768
  intermediate_dim: 2304
  num_layers: 12
  n_fft: 1280
  hop_length: 320

discriminator_config:
  mpd:
    mpd_reshapes: [2, 3, 5, 7, 11]
  mbd:
    mbd_fft_sizes: [2048, 1024, 512]

DDP:
  world_size: 4

optimizer:
  lr: 1e-4

scheduler:
  warmup_steps: 10000  # default: 20k steps
  decay_until_step: 110000  # default: 200k steps
  max_lr: 2e-4
  min_lr: 1e-6

loss:
  sampling_rate: 16000
  n_mels: [5, 10, 20, 40, 80, 160, 320]
  window_lengths: [32, 64, 128, 256, 512, 1024, 2048]
  mag_weight: 0.0
  log_weight: 1.0
  pow: 1.0
  weight: 1.0
  window_type: "hann"

coeff:
  recons: 15
  adv: 2
  feat: 1

samplerate:
  16000

train_dataset:
  use_simulation_root: ${oc.env:USE_SIMULATION_ROOT,../USE_simulation}
  speech_csvs:
    - ${oc.env:PASE_URGENT2_DNS_TRAIN_SPEECH_CSV,/path/to/urgent2/dns5_fullband/meta_speech_resampled_filtered_train.csv}
    - ${oc.env:PASE_URGENT2_LIBRITTS_TRAIN_SPEECH_CSV,/path/to/urgent2/libritts/meta_resampled_filtered_train.csv}
    - ${oc.env:PASE_URGENT2_VCTK_TRAIN_SPEECH_CSV,/path/to/urgent2/vctk/meta_train.csv}
  wav_len: 2  # default: 4
  num_per_epoch: 48000
  random_start: True
  default_fs: 16000
  mode: train
  normalize: true
  seed: 3407

train_dataloader:
  batch_size: 24  # default: 12 per GPU
  num_workers: 4
  drop_last: True
  pin_memory: True

validation_dataset:
  use_simulation_root: ${oc.env:USE_SIMULATION_ROOT,../USE_simulation}
  speech_csvs:
    - ${oc.env:PASE_URGENT2_DNS_VALID_SPEECH_CSV,/path/to/urgent2/dns5_fullband/meta_speech_resampled_filtered_validation.csv}
    - ${oc.env:PASE_URGENT2_LIBRITTS_VALID_SPEECH_CSV,/path/to/urgent2/libritts/meta_resampled_validation.csv}
    - ${oc.env:PASE_URGENT2_VCTK_VALID_SPEECH_CSV,/path/to/urgent2/vctk/meta_validation.csv}
  wav_len: 4
  num_per_epoch: 1000
  random_start: False
  default_fs: 16000
  mode: validation
  normalize: true
  seed: 3407

validation_dataloader:
  batch_size: 1    # default: 1
  num_workers: 4
  drop_last: True
  pin_memory: True

trainer:
  epochs: 200
  save_checkpoint_interval: 10
  clip_grad_norm_value: 3.0
  run_root: ${oc.env:PASE_RUN_ROOT,./runs}
  checkpoint_root: ${oc.env:PASE_GLOBAL_CHECKPOINT_DIR,./checkpoints}
  exp_path: ${trainer.run_root}/vocoder_l24
  resume: False
  resume_datetime: 2026-03-24-15h04m
  use_wandb: false
  wandb_project: pase
  wandb_entity: null
  wandb_mode: online
  wandb_run_name: null
  wandb_tags: ["pase", "vocoder_l24", "use_simulation", "clean"]
