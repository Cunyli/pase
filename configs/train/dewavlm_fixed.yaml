repo_name: pase
experiment: dewavlm_paired
dataset_type: use_simulation_fixed

teacher_config:
  wavlm_ckpt_path: ${oc.env:PASE_WAVLM_CKPT,checkpoints/pase_hf/WavLM-Large.pt}
  output_layer: 24
  load_pretrained: true
  frozen: true

student_config:
  wavlm_ckpt_path: ${oc.env:PASE_DEWAVLM_CKPT,checkpoints/pase_hf/DeWavLM.tar}
  output_layer: 24
  load_pretrained: true
  frozen: false

vocoder_config:
  ckpt_path: ${oc.env:PASE_VOCODER_L24_CKPT,checkpoints/pase_hf/Vocoder_L24.tar}

DDP:
  world_size: 1

optimizer:
  lr: 0.001

scheduler:
  warmup_steps: 1000
  decay_until_step: 20000
  max_lr: 1e-5
  min_lr: 1e-6

samplerate: 16000

train_dataset:
  use_simulation_root: ${oc.env:USE_SIMULATION_ROOT,../USE_simulation}
  pair_manifest: ${oc.env:PASE_TRAIN_PAIRS_CSV,/path/to/train/paired.csv}
  wav_len: 4
  num_per_epoch: 0
  random_start: true
  default_fs: 16000
  mode: train
  normalize: true

train_dataloader:
  batch_size: 2
  num_workers: 4
  drop_last: true
  pin_memory: true

validation_dataset:
  use_simulation_root: ${oc.env:USE_SIMULATION_ROOT,../USE_simulation}
  pair_manifest: ${oc.env:PASE_VALID_PAIRS_CSV,/path/to/valid/paired.csv}
  wav_len: 4
  num_per_epoch: 0
  random_start: false
  default_fs: 16000
  mode: validation
  normalize: true

validation_dataloader:
  batch_size: 1
  num_workers: 4
  drop_last: false
  pin_memory: true

trainer:
  epochs: 20
  save_checkpoint_interval: 5
  clip_grad_norm_value: 3.0
  run_root: ${oc.env:PASE_RUN_ROOT,./runs}
  checkpoint_root: ${oc.env:PASE_GLOBAL_CHECKPOINT_DIR,./checkpoints}
  exp_path: ${trainer.run_root}/dewavlm_paired
  resume: false
  resume_datetime: ""
  use_wandb: false
  wandb_project: pase
  wandb_entity: null
  wandb_mode: online
  wandb_run_name: null
  wandb_tags: ["pase", "dewavlm_paired", "use_simulation", "fixed"]
